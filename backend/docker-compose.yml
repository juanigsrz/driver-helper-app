services:
  osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    container_name: dh-osrm
    command: osrm-routed --algorithm mld /data/argentina-latest.osrm
    volumes:
      - ./osm-data:/data
    ports:
      - "127.0.0.1:5000:5000"
    restart: unless-stopped

  nominatim:
    image: mediagis/nominatim:4.5
    container_name: dh-nominatim
    environment:
      PBF_PATH: /nominatim/data/argentina-latest.osm.pbf
      NOMINATIM_PASSWORD: change-me
      IMPORT_STYLE: address
    volumes:
      - ./osm-data:/nominatim/data
      - nominatim-pg:/var/lib/postgresql/16/main
    ports:
      - "127.0.0.1:7070:8080"
    shm_size: 1g
    restart: unless-stopped

volumes:
  nominatim-pg:
